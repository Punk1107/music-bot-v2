name: CI — Music Bot V2

on:
  push:
    branches: [main, fix/*, feature/*]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies (FFmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Create required directories
        run: mkdir -p data logs

      - name: Set minimal test environment
        run: |
          echo "DISCORD_TOKEN=test_token_placeholder" >> $GITHUB_ENV
          echo "DATABASE_PATH=data/test.db" >> $GITHUB_ENV

      - name: Run test suite with coverage
        run: |
          pytest tests/ \
            --cov=core \
            --cov=utils \
            --cov=models \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70 \
            -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    continue-on-error: true  # Non-blocking: lint issues won't fail the PR

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check . --select E,W,F --ignore E501 || true
